<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blackhole 3D</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#050506}
  #app{position:fixed;inset:0;cursor:grab}
  #app:active{cursor:grabbing}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(60% 60% at 32% 45%,rgba(143,176,212,.10),transparent 60%),
      radial-gradient(60% 60% at 68% 55%,rgba(181,106,56,.10),transparent 60%);}
  canvas{position:relative;z-index:1}
  .hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:2;
    color:#6e6e79;font-family:"Space Mono",ui-monospace,monospace;font-size:.76rem;
    letter-spacing:.08em;pointer-events:none}
</style>
</head>
<body>
<div id="app"></div>
<div class="hint">drag to orbit &middot; scroll to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";
  import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
  import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
  import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

  const SKY = new THREE.Color("#8fb0d4");
  const ORANGE = new THREE.Color("#b56a38");

  const app = document.getElementById("app");
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050506);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 7, 26);

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  app.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 14;
  controls.maxDistance = 70;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.6;

  /* ---------- blackhole ---------- */
  const hole = new THREE.Group();
  scene.add(hole);

  // event horizon: a pure black sphere
  const horizon = new THREE.Mesh(
    new THREE.SphereGeometry(2.7, 48, 48),
    new THREE.MeshBasicMaterial({ color:0x000000 })
  );
  hole.add(horizon);

  // accretion disk: a tilted, spinning plane with a conic + radial gradient texture
  function diskTexture(size=512){
    const cv = document.createElement("canvas"); cv.width = cv.height = size;
    const g = cv.getContext("2d");
    const cx = size/2;
    // angular colour: orange on one side, blue on the other, white-hot top/bottom
    const conic = g.createConicGradient(0, cx, cx);
    conic.addColorStop(0.00, "#b56a38");
    conic.addColorStop(0.25, "#ffffff");
    conic.addColorStop(0.50, "#8fb0d4");
    conic.addColorStop(0.75, "#ffffff");
    conic.addColorStop(1.00, "#b56a38");
    g.fillStyle = conic; g.fillRect(0,0,size,size);
    // radial alpha mask: transparent hole, glowing ring band, soft outer fade
    g.globalCompositeOperation = "destination-in";
    const m = g.createRadialGradient(cx,cx,0,cx,cx,cx);
    m.addColorStop(0.00, "rgba(255,255,255,0)");
    m.addColorStop(0.30, "rgba(255,255,255,0)");
    m.addColorStop(0.37, "rgba(255,255,255,1)");
    m.addColorStop(0.52, "rgba(255,255,255,1)");
    m.addColorStop(0.66, "rgba(255,255,255,0.45)");
    m.addColorStop(0.80, "rgba(255,255,255,0)");
    g.fillStyle = m; g.fillRect(0,0,size,size);
    const tex = new THREE.CanvasTexture(cv);
    tex.anisotropy = 8;
    return tex;
  }

  const disk = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshBasicMaterial({
      map: diskTexture(), transparent:true, side:THREE.DoubleSide,
      blending:THREE.AdditiveBlending, depthWrite:false })
  );
  hole.add(disk);

  // photon ring: a bright thin halo hugging the horizon, in the disk plane
  const photon = new THREE.Mesh(
    new THREE.TorusGeometry(2.95, 0.06, 16, 160),
    new THREE.MeshBasicMaterial({ color:0xfff1e2 })
  );
  hole.add(photon);

  hole.rotation.x = -1.05;   // tilt the whole system toward the viewer

  /* ---------- nebula clouds + starfield (the space background) ---------- */
  function radialSprite(stops, size=256){
    const cv = document.createElement("canvas"); cv.width = cv.height = size;
    const g = cv.getContext("2d");
    const grd = g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    stops.forEach(s => grd.addColorStop(s[0], s[1]));
    g.fillStyle = grd; g.fillRect(0,0,size,size);
    return new THREE.SpriteMaterial({ map:new THREE.CanvasTexture(cv),
      blending:THREE.AdditiveBlending, transparent:true, depthWrite:false });
  }
  const nebBlue = new THREE.Sprite(radialSprite([[0,"rgba(143,176,212,0.45)"],[1,"rgba(143,176,212,0)"]]));
  nebBlue.scale.set(95,95,1); nebBlue.position.set(-34,-8,-65); scene.add(nebBlue);
  const nebWarm = new THREE.Sprite(radialSprite([[0,"rgba(181,106,56,0.45)"],[1,"rgba(181,106,56,0)"]]));
  nebWarm.scale.set(95,95,1); nebWarm.position.set(36,10,-75); scene.add(nebWarm);

  const starGeo = new THREE.BufferGeometry();
  const N = 2400, sp = new Float32Array(N*3), sc = new Float32Array(N*3), c = new THREE.Color();
  for(let i=0;i<N;i++){
    const r = 120 + Math.random()*620;
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    sp[i*3]=r*Math.sin(ph)*Math.cos(th); sp[i*3+1]=r*Math.sin(ph)*Math.sin(th); sp[i*3+2]=r*Math.cos(ph);
    const tint = Math.random();
    c.set("#ffffff").lerp(tint<0.5?SKY:ORANGE, Math.random()*0.5);
    sc[i*3]=c.r; sc[i*3+1]=c.g; sc[i*3+2]=c.b;
  }
  starGeo.setAttribute("position", new THREE.BufferAttribute(sp,3));
  starGeo.setAttribute("color", new THREE.BufferAttribute(sc,3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
    size:1.1, sizeAttenuation:true, vertexColors:true, transparent:true, opacity:.9 }));
  scene.add(stars);

  /* ---------- bloom = the accretion glow ---------- */
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.25, 0.6, 0.0));

  /* ---------- loop ---------- */
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    disk.rotation.z += dt * 0.35;     // the disk spins (accretion)
    stars.rotation.y += dt * 0.01;
    controls.update();
    composer.render();
  }
  animate();

  addEventListener("resize", () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
