<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinity 3D · blackhole motif</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#050506}
  #app{position:fixed;inset:0;cursor:grab}
  #app:active{cursor:grabbing}
  /* faint nebula bed behind the canvas for extra depth */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(60% 60% at 32% 45%,rgba(143,176,212,.10),transparent 60%),
      radial-gradient(60% 60% at 68% 55%,rgba(181,106,56,.10),transparent 60%);}
  canvas{position:relative;z-index:1}
  .hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:2;
    color:#6e6e79;font-family:"Space Mono",ui-monospace,monospace;font-size:.76rem;
    letter-spacing:.08em;pointer-events:none}
</style>
</head>
<body>
<div id="app"></div>
<div class="hint">drag to orbit &middot; scroll to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";
  import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
  import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
  import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

  /* ---------- palette ---------- */
  const SKY   = new THREE.Color("#8fb0d4");
  const WHITE = new THREE.Color("#ffffff");
  const ORANGE= new THREE.Color("#b56a38");
  const SCALE = 10;

  const app = document.getElementById("app");
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050506);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 6, 30);

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  app.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 16;
  controls.maxDistance = 70;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.9;

  /* ---------- the 3D infinity curve ----------
     Planar lemniscate of Bernoulli in x/y, with z = sin(t) so the two
     strands that meet at the centre pass at +z and -z. That turns the flat
     figure-eight into a true 3D knot whose crossing has real depth. */
  const pts = [];
  const STEPS = 400;
  for(let i=0;i<STEPS;i++){
    const t = (i/STEPS) * Math.PI * 2;
    const denom = 1 + Math.sin(t)*Math.sin(t);
    pts.push(new THREE.Vector3(
      (SCALE * Math.cos(t)) / denom,
      (SCALE * Math.sin(t) * Math.cos(t)) / denom,
      2.6 * Math.sin(t)
    ));
  }
  const curve = new THREE.CatmullRomCurve3(pts, true, "catmullrom", 0.5);

  /* ---------- glowing accretion ribbon (tube) ---------- */
  const tubularSeg = 700, radius = 0.34, radialSeg = 20;
  const geo = new THREE.TubeGeometry(curve, tubularSeg, radius, radialSeg, true);

  // colour each vertex by its x position: blue (left) -> white (centre) -> orange (right)
  const pos = geo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const c = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const ratio = (pos.getX(i) + SCALE) / (SCALE * 2);   // 0..1
    if(ratio < 0.5) c.copy(SKY).lerp(WHITE, ratio/0.5);
    else            c.copy(WHITE).lerp(ORANGE, (ratio-0.5)/0.5);
    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  }
  geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

  const tube = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors:true }));
  const ring = new THREE.Group();
  ring.add(tube);
  ring.rotation.x = 0.5;          // tip it toward the viewer for a 3D read
  scene.add(ring);

  /* ---------- soft canvas-texture sprites: core flare + nebula clouds ---------- */
  function radialSprite(stops, size=256){
    const cv = document.createElement("canvas"); cv.width = cv.height = size;
    const g = cv.getContext("2d");
    const grd = g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    stops.forEach(s => grd.addColorStop(s[0], s[1]));
    g.fillStyle = grd; g.fillRect(0,0,size,size);
    const tex = new THREE.CanvasTexture(cv);
    return new THREE.SpriteMaterial({ map:tex, blending:THREE.AdditiveBlending,
      transparent:true, depthWrite:false });
  }

  const flare = new THREE.Sprite(radialSprite([
    [0,"rgba(255,255,255,1)"],[0.35,"rgba(255,233,214,0.7)"],[1,"rgba(255,255,255,0)"]]));
  flare.scale.set(7,7,1);
  ring.add(flare);   // sits at curve centre (origin), the crossing point

  const nebBlue = new THREE.Sprite(radialSprite([
    [0,"rgba(143,176,212,0.5)"],[1,"rgba(143,176,212,0)"]]));
  nebBlue.scale.set(90,90,1); nebBlue.position.set(-30,-6,-60);
  scene.add(nebBlue);
  const nebWarm = new THREE.Sprite(radialSprite([
    [0,"rgba(181,106,56,0.5)"],[1,"rgba(181,106,56,0)"]]));
  nebWarm.scale.set(90,90,1); nebWarm.position.set(34,8,-70);
  scene.add(nebWarm);

  /* ---------- starfield space background ---------- */
  const starGeo = new THREE.BufferGeometry();
  const N = 2200, sp = new Float32Array(N*3), sc = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r = 120 + Math.random()*600;
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    sp[i*3]   = r*Math.sin(ph)*Math.cos(th);
    sp[i*3+1] = r*Math.sin(ph)*Math.sin(th);
    sp[i*3+2] = r*Math.cos(ph);
    const tint = Math.random();
    c.copy(WHITE).lerp(tint<0.5?SKY:ORANGE, Math.random()*0.5);
    sc[i*3]=c.r; sc[i*3+1]=c.g; sc[i*3+2]=c.b;
  }
  starGeo.setAttribute("position", new THREE.BufferAttribute(sp,3));
  starGeo.setAttribute("color", new THREE.BufferAttribute(sc,3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
    size:1.1, sizeAttenuation:true, vertexColors:true, transparent:true, opacity:.9 }));
  scene.add(stars);

  /* ---------- bloom = the accretion glow ---------- */
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.3, 0.6, 0.0);
  composer.addPass(bloom);

  /* ---------- loop ---------- */
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    flare.scale.setScalar(6 + Math.sin(t*2.2)*1.4);   // pulse
    stars.rotation.y = t * 0.01;
    controls.update();
    composer.render();
  }
  animate();

  addEventListener("resize", () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
